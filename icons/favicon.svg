<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1730"/>
      <stop offset="100%" stop-color="#0d2145"/>
    </linearGradient>
    <clipPath id="left">
      <rect x="0" y="0" width="50" height="100"/>
    </clipPath>
    <clipPath id="right">
      <rect x="50" y="0" width="50" height="100"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Sisi KIRI — putih, tebal -->
  <g clip-path="url(#left)">
    <line x1="24" y1="26" x2="76" y2="74" stroke="white" stroke-width="10" stroke-linecap="round"/>
    <line x1="24" y1="74" x2="76" y2="26" stroke="white" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Sisi KANAN — #60a5fa, lebih tipis dan pendek (tidak sampai pojok) -->
  <g clip-path="url(#right)">
    <line x1="24" y1="26" x2="70" y2="72" stroke="#60a5fa" stroke-width="7" stroke-linecap="round"/>
    <line x1="24" y1="74" x2="70" y2="28" stroke="#60a5fa" stroke-width="7" stroke-linecap="round"/>
  </g>
</svg>
